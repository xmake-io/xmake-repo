name: Build index

# Generates a flat JSON index of all packages (dist/packages.json) and
# publishes it to the `gh-pages` branch. Consumed by external trackers
# (e.g. repology.org) that need a structured view of the repository
# without parsing xmake.lua source files. See xmake-io/xmake-repo#9966.

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    if: github.repository == 'xmake-io/xmake-repo'   # mirror the gate used in deploy.yml
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push the gh-pages branch

    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build packages.json
        run: xmake l scripts/build_index.lua

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false
          commit_message: 'autoupdate packages.json'
