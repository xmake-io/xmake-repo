name: FreeBSD

on:
  pull_request:
    branches:
      - dev

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-latest]
        kind: [static, shared]

    runs-on: ${{ matrix.os }}

    concurrency:
        group: ${{ github.ref }}-${{ github.base_ref }}-${{ github.head_ref }}-FreeBSD-${{ matrix.kind }}
        cancel-in-progress: true
    steps:
      - uses: actions/checkout@v1

      - name: Tests
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          sync: sshfs
          mem: 12288
          copyback: false
          prepare: |
            # 1. Nuke ALL existing repo configs to stop the ghost 'pkg+' SRV errors
            rm -f /etc/pkg/*.conf
            rm -rf /usr/local/etc/pkg/repos
            mkdir -p /usr/local/etc/pkg/repos
            
            # 2. Write a single, explicitly direct configuration. 
            # Using plain HTTP avoids CA root issues before ca_root_nss is installed.
            echo 'FreeBSD: { url: "http://pkg.freebsd.org/${ABI}/latest", mirror_type: "none", signature_type: "fingerprints", fingerprints: "/usr/share/keys/pkg", enabled: yes }' > /usr/local/etc/pkg/repos/FreeBSD.conf
            
            # 3. Completely obliterate the cache directories to fix the 'truncated reply'
            rm -rf /var/db/pkg/repos/*
            rm -f /var/db/pkg/repo-*.sqlite
            rm -rf /var/cache/pkg/*
            
            # 4. Bootstrap, update, and install dependencies using IPv4 (-4) 
            # to bypass common QEMU IPv6 networking dropouts in GitHub Actions
            env ASSUME_ALWAYS_YES=yes pkg -4 bootstrap -f
            pkg -4 update -f
            pkg -4 install -y git curl unzip gmake llvm gsed bash perl5 openssl 7-zip coreutils
          run: |
            git config --global --add safe.directory `pwd`
            git clone --recurse-submodules https://github.com/xmake-io/xmake.git /tmp/xmake -b dev
            cd /tmp/xmake
            ./configure
            gmake -j4
            gmake install
            export XMAKE_ROOT=y
            cd -
            xmake l ./scripts/test.lua -D -k ${{ matrix.kind }} -vD
